version: "3.9"

# ---------------------------------------------------------------------------
# DC Workbench — Production Docker Compose
#
# Services:
#   nextjs     — Next.js app (port 3002 internally, proxied by nginx)
#   analytics  — Python FastAPI service (port 8000 internally)
#   nginx      — Reverse proxy + SSL termination (ports 80/443)
#   litestream — SQLite continuous backup to S3/R2/Backblaze
#
# Volumes:
#   app_data   — Shared persistent volume for SQLite DB and reports
#
# Quick start:
#   cp .env.example .env   # Fill in all required values
#   docker compose up -d --build
# ---------------------------------------------------------------------------

services:
  # ── Next.js app ────────────────────────────────────────────────────────────
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WORKBENCH_SESSION_SECRET: ${WORKBENCH_SESSION_SECRET}
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      WORKBENCH_SESSION_SECRET: ${WORKBENCH_SESSION_SECRET}
      WORKBENCH_ADMIN_PASSWORD: ${WORKBENCH_ADMIN_PASSWORD}
      WORKBENCH_ADMIN_USER: ${WORKBENCH_ADMIN_USER:-admin}
      SQLITE_PATH: /app/data/workbench.db
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-DC Workbench}
      OPENROUTER_DEFAULT_MODEL: ${OPENROUTER_DEFAULT_MODEL:-openai/gpt-4o-mini}
      WORKBENCH_BYOK_ENCRYPTION_KEY: ${WORKBENCH_BYOK_ENCRYPTION_KEY:-}
      PYTHON_SERVICE_URL: http://analytics:8000
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
    volumes:
      - app_data:/app/data
    expose:
      - "3002"
    depends_on:
      analytics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Python analytics service ───────────────────────────────────────────────
  analytics:
    build:
      context: ./python
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      FRED_API_KEY: ${FRED_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_DEFAULT_MODEL: ${OPENROUTER_DEFAULT_MODEL:-openai/gpt-4o-mini}
      REPORTS_DIR: /app/data/reports
      REPORT_HOUR_UTC: ${REPORT_HOUR_UTC:-2}
    volumes:
      - app_data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # Mount your SSL certs here
      - nginx_cache:/var/cache/nginx
    depends_on:
      - nextjs
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Litestream SQLite replication ─────────────────────────────────────────
  litestream:
    image: litestream/litestream:latest
    restart: unless-stopped
    volumes:
      - app_data:/app/data
      - ./litestream.yml:/etc/litestream.yml:ro
    environment:
      LITESTREAM_ACCESS_KEY_ID: ${LITESTREAM_ACCESS_KEY_ID:-}
      LITESTREAM_SECRET_ACCESS_KEY: ${LITESTREAM_SECRET_ACCESS_KEY:-}
    command: replicate
    profiles:
      - backup    # opt-in: `docker compose --profile backup up -d`
    depends_on:
      - nextjs

volumes:
  app_data:
    driver: local
  nginx_cache:
    driver: local
